spring:
  datasource:
    url: jdbc:h2:mem:petize;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  jwt:
    expiration: 3600000
    key: test-secret-key-must-be-at-least-32-chars-long-for-hs256
