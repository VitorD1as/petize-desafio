services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gym_security
      MYSQL_USER: petize
      MYSQL_PASSWORD: petize
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gym_security?createDatabaseIfNotExist=true
      DATABASE_USERNAME: petize
      DATABASE_PASSWORD: petize
    depends_on:
      mysql:
        condition: service_healthy
